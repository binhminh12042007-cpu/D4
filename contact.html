<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA.Me - Contact</title>
    <link rel="stylesheet" href="style.css">
    <!-- ANNOTATION:
    External stylesheet separates design from structure for maintainability.
    Responsive meta tag ensures mobile-friendly scaling. -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- ANNOTATION:
         Font Awesome CDN included for scalable social media icons, improving UX and accessibility. -->
</head>
<body>

    <!-- Minecraft Clouds -->
    <!-- Background Clouds -->
    <!-- ANNOTATION:
         Decorative cloud elements provide visual depth, continuity with other pages, and playful theme reminiscent of Minecraft. -->
    <div class="clouds-container">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
        <div class="cloud cloud-5"></div>
        <div class="cloud cloud-6"></div>
        <div class="cloud cloud-7"></div>
        <div class="cloud cloud-8"></div>
    </div>
    <!-- Navigation Bar -->
    <!-- ANNOTATION:
         Sticky/consistent navbar improves usability and site navigation.
         Logo and links maintain brand identity and allow quick access to all pages. -->    

    <!-- menu -->
    <nav class="navbar">
        <div class="nav-left">
            <img src="DNA.Me logo.png" alt="logo" class="nav-logo">
        </div>
        <!-- ANNOTATION:
                 Logo provides visual branding; alt attribute supports accessibility and screen readers. -->

        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <!-- ANNOTATION:
                 Clear, descriptive anchor text ensures accessibility and SEO benefits. -->
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main class="container">
        <h1>Contact Us</h1>
        <p>Have questions? We'd love to hear from you!</p>
        <p>Email: dnameteam@gmail.com</p>
        <!-- ANNOTATION:
             Provides primary contact method; plain text ensures universal accessibility. -->
    </main>

    <!-- footer -->
    <!-- ANNOTATION:
        Organized footer divides content into contact info and social media links, reinforcing usability and brand presence. -->
    <footer class="footer">
        <div class="footer-left">
            <h3>Contact Info</h3>
            <p>Email: dnameteam@gmail.com</p>
            <!-- ANNOTATION:
                 Reiterating email in footer ensures consistent access regardless of scroll position. -->
        </div>
        <div class="footer-right">
            <h3>Follow Us</h3>
        <div class="social-icons">
            <a href="https://www.instagram.com/_bookdeuniverse?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-instagram"></i>
                <!-- ANNOTATION:
                         Social icon opens external link in new tab, using rel="noopener noreferrer" for security. -->
            </a>
        </div>
        </div>
        <div class="copyright">
            © 2025 DNA.Me Project
            <!-- ANNOTATION:
                 Copyright information provides ownership, legal clarity, and professional polish. -->
        </div>
    </footer>

</body>
</html>
